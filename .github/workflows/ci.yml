name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, reopened, synchronize, closed]
  release:
    types: [published]

permissions:
  contents: read
  pull-requests: read
  packages: write

jobs:
  analyze-pre-test:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Run Agent 4 CI analysis
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
        run: |
          python scripts/run_ci_analysis.py \
            --phase pre-test \
            --event-name "${{ github.event_name }}" \
            --event-payload "$GITHUB_EVENT_PATH" \
            --base-ref "${{ github.event.pull_request.base.sha || github.event.before }}" \
            --head-ref "${{ github.sha }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --use-llm \
            --write-step-summary \
            --output-dir artifacts/ci-analysis

      - name: Upload pre-test analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-analysis-pre-test
          path: artifacts/ci-analysis/pre-test

  approve-test:
    needs: analyze-pre-test
    if: github.event_name == 'push' || github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: hitachi-test-approval
    steps:
      - name: Manual approval gate
        run: echo "Approved for TEST progression."

  test-and-build:
    needs:
      - analyze-pre-test
      - approve-test
    if: >
      always() &&
      needs.analyze-pre-test.result == 'success' &&
      (
        (github.event_name == 'pull_request' && github.event.action != 'closed') ||
        ((github.event_name == 'push' || github.event_name == 'release') && needs.approve-test.result == 'success')
      )
    runs-on: ubuntu-latest
    env:
      GITOPS_REPO: ${{ vars.GITOPS_REPO }}
      APP_NAME: ${{ vars.APP_NAME }}
      IMAGE_TAG: ${{ github.sha }}
      VALUES_ENV: ${{ github.event_name == 'release' && 'prod' || 'test' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag for release
        if: github.event_name == 'release'
        run: |
          echo "IMAGE_TAG=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run tests
        id: test_step
        continue-on-error: true
        run: npm test

      - name: Set up Docker Buildx
        if: >
          steps.test_step.outcome == 'success' &&
          (
            github.event_name == 'push' ||
            github.event_name == 'release' ||
            (github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false)
          )
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        if: >
          steps.test_step.outcome == 'success' &&
          (
            github.event_name == 'push' ||
            github.event_name == 'release' ||
            (github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false)
          )
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        if: >
          steps.test_step.outcome == 'success' &&
          (
            github.event_name == 'push' ||
            github.event_name == 'release' ||
            (github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false)
          )
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: >
          steps.test_step.outcome == 'success' &&
          (
            github.event_name == 'push' ||
            github.event_name == 'release' ||
            (github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false)
          )
        id: build
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Write stage results summary
        if: always()
        env:
          TEST_OUTCOME: ${{ steps.test_step.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          mkdir -p artifacts/ci-stage-results
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def map_status(value: str) -> str:
              normalized = (value or "").strip().lower()
              mapping = {
                  "success": "PASS",
                  "failure": "FAIL",
                  "cancelled": "BLOCKED",
                  "skipped": "NOT_RUN",
              }
              return mapping.get(normalized, "NOT_RUN")

          payload = {
              "tests": {
                  "status": map_status(os.environ.get("TEST_OUTCOME")),
                  "outcome": os.environ.get("TEST_OUTCOME", ""),
                  "command": "npm test",
              },
              "build": {
                  "status": map_status(os.environ.get("BUILD_OUTCOME")),
                  "outcome": os.environ.get("BUILD_OUTCOME", ""),
                  "command": "docker/build-push-action@v6",
                  "image_tag": os.environ.get("IMAGE_TAG", ""),
              },
          }

          output_path = Path("artifacts/ci-stage-results/test_build_summary.json")
          output_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload test/build summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-stage-results
          path: artifacts/ci-stage-results

      - name: Checkout GitOps repo
        if: >
          steps.build.outcome == 'success' &&
          (
            github.event_name == 'push' ||
            (github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false)
          )
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update GitOps values
        if: github.event_name == 'push' && steps.build.outcome == 'success'
        run: |
          VALUES_PATH="gitops/environments/${{ env.VALUES_ENV }}/values.yaml"
          mkdir -p "$(dirname "$VALUES_PATH")"

          if [ ! -f "$VALUES_PATH" ]; then
            printf '%s\n' \
              "image:" \
              "  repository: ghcr.io/${{ github.repository }}" \
              "  tag: ${{ env.IMAGE_TAG }}" \
              "  pullPolicy: IfNotPresent" \
              > "$VALUES_PATH"
          fi

          sed -i -E "s#^([[:space:]]*repository:).*#\\1 ghcr.io/${{ github.repository }}#" "$VALUES_PATH" || true
          sed -i -E "s#^([[:space:]]*tag:).*#\\1 ${{ env.IMAGE_TAG }}#" "$VALUES_PATH" || true

          if ! grep -qE '^[[:space:]]*pullPolicy:' "$VALUES_PATH"; then
            printf '%s\n' "  pullPolicy: IfNotPresent" >> "$VALUES_PATH"
          fi

          git -C gitops status --short

      - name: Commit and push GitOps changes
        if: github.event_name == 'push' && steps.build.outcome == 'success'
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "environments/${{ env.VALUES_ENV }}/values.yaml"

          if git diff --cached --quiet; then
            echo "No GitOps changes to commit."
            exit 0
          fi

          git commit -m "chore: update ${APP_NAME} image tag to ${{ env.IMAGE_TAG }}"
          git push

      - name: Update GitOps PR values
        if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false && steps.build.outcome == 'success'
        run: |
          PR_NAMESPACE="pr-${{ github.event.pull_request.number }}"
          PR_RESOURCE_NAME="${APP_NAME}-${PR_NAMESPACE}"
          VALUES_PATH="gitops/environments/dev/${PR_NAMESPACE}/values.yaml"
          mkdir -p "$(dirname "$VALUES_PATH")"

          if [ ! -f "$VALUES_PATH" ]; then
            printf '%s\n' \
              "namespace: ${PR_NAMESPACE}" \
              "deploymentName: ${PR_RESOURCE_NAME}" \
              "serviceName: ${PR_RESOURCE_NAME}" \
              "image:" \
              "  repository: ghcr.io/${{ github.repository }}" \
              "  tag: ${{ env.IMAGE_TAG }}" \
              "  pullPolicy: IfNotPresent" \
              > "$VALUES_PATH"
          fi

          sed -i -E "s#^([[:space:]]*namespace:).*#\\1 ${PR_NAMESPACE}#" "$VALUES_PATH" || true
          sed -i -E "s#^([[:space:]]*deploymentName:).*#\\1 ${PR_RESOURCE_NAME}#" "$VALUES_PATH" || true
          sed -i -E "s#^([[:space:]]*serviceName:).*#\\1 ${PR_RESOURCE_NAME}#" "$VALUES_PATH" || true

          grep -qE '^[[:space:]]*deploymentName:' "$VALUES_PATH" || echo "deploymentName: ${PR_RESOURCE_NAME}" >> "$VALUES_PATH"
          grep -qE '^[[:space:]]*serviceName:' "$VALUES_PATH" || echo "serviceName: ${PR_RESOURCE_NAME}" >> "$VALUES_PATH"

          sed -i -E "s#^([[:space:]]*repository:).*#\\1 ghcr.io/${{ github.repository }}#" "$VALUES_PATH" || true
          sed -i -E "s#^([[:space:]]*tag:).*#\\1 ${{ env.IMAGE_TAG }}#" "$VALUES_PATH" || true

          if ! grep -qE '^[[:space:]]*pullPolicy:' "$VALUES_PATH"; then
            printf '%s\n' "  pullPolicy: IfNotPresent" >> "$VALUES_PATH"
          fi

          git -C gitops status --short

      - name: Commit and push GitOps PR values
        if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false && steps.build.outcome == 'success'
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "environments/dev/pr-${{ github.event.pull_request.number }}/values.yaml"

          if git diff --cached --quiet; then
            echo "No PR values changes to commit."
            exit 0
          fi

          git commit -m "chore: update ${APP_NAME} PR-${{ github.event.pull_request.number }} values"
          git push

      - name: Enforce test and build status
        if: always()
        env:
          TEST_OUTCOME: ${{ steps.test_step.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          REQUIRE_BUILD: ${{ github.event_name == 'push' || github.event_name == 'release' || (github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false) }}
        run: |
          if [ "${TEST_OUTCOME}" != "success" ]; then
            echo "Tests did not pass (${TEST_OUTCOME})."
            exit 1
          fi

          if [ "${REQUIRE_BUILD}" = "true" ] && [ "${BUILD_OUTCOME}" != "success" ]; then
            echo "Image build/push did not pass (${BUILD_OUTCOME})."
            exit 1
          fi

  analyze-pre-prod:
    needs:
      - analyze-pre-test
      - test-and-build
    if: >
      github.event_name == 'release' &&
      always() &&
      needs.analyze-pre-test.result == 'success' &&
      needs.test-and-build.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Download pre-test analysis artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-analysis-pre-test
          path: artifacts/ci-analysis/pre-test

      - name: Download test/build summary artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-stage-results
          path: artifacts/ci-stage-results

      - name: Run Agent 5 CI analysis
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
        run: |
          python scripts/run_ci_analysis.py \
            --phase pre-prod \
            --event-name "${{ github.event_name }}" \
            --event-payload "$GITHUB_EVENT_PATH" \
            --base-ref "${{ github.event.pull_request.base.sha || github.event.before }}" \
            --head-ref "${{ github.sha }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --use-llm \
            --write-step-summary \
            --previous-report artifacts/ci-analysis/pre-test/ci_report.json \
            --stage-results-json artifacts/ci-stage-results/test_build_summary.json \
            --output-dir artifacts/ci-analysis

      - name: Upload pre-prod analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-analysis-pre-prod
          path: artifacts/ci-analysis/pre-prod

  approve-prod:
    needs: analyze-pre-prod
    if: github.event_name == 'release' && needs.analyze-pre-prod.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: hitachi-prod-approval
    steps:
      - name: Manual approval gate
        run: echo "Approved for PROD progression."

  deploy-prod:
    needs:
      - approve-prod
      - test-and-build
    if: github.event_name == 'release' && needs.approve-prod.result == 'success' && needs.test-and-build.result == 'success'
    runs-on: ubuntu-latest
    env:
      GITOPS_REPO: ${{ vars.GITOPS_REPO }}
      APP_NAME: ${{ vars.APP_NAME }}
      IMAGE_TAG: ${{ github.sha }}
      VALUES_ENV: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag for release
        run: |
          echo "IMAGE_TAG=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update GitOps values
        run: |
          VALUES_PATH="gitops/environments/${{ env.VALUES_ENV }}/values.yaml"
          mkdir -p "$(dirname "$VALUES_PATH")"

          if [ ! -f "$VALUES_PATH" ]; then
            printf '%s\n' \
              "image:" \
              "  repository: ghcr.io/${{ github.repository }}" \
              "  tag: ${{ env.IMAGE_TAG }}" \
              "  pullPolicy: IfNotPresent" \
              > "$VALUES_PATH"
          fi

          sed -i -E "s#^([[:space:]]*repository:).*#\\1 ghcr.io/${{ github.repository }}#" "$VALUES_PATH" || true
          sed -i -E "s#^([[:space:]]*tag:).*#\\1 ${{ env.IMAGE_TAG }}#" "$VALUES_PATH" || true

          if ! grep -qE '^[[:space:]]*pullPolicy:' "$VALUES_PATH"; then
            printf '%s\n' "  pullPolicy: IfNotPresent" >> "$VALUES_PATH"
          fi

          git -C gitops status --short

      - name: Commit and push GitOps changes
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "environments/${{ env.VALUES_ENV }}/values.yaml"

          if git diff --cached --quiet; then
            echo "No GitOps changes to commit."
            exit 0
          fi

          git commit -m "chore: update ${APP_NAME} image tag to ${{ env.IMAGE_TAG }}"
          git push

  cleanup-pr-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    env:
      GITOPS_REPO: ${{ vars.GITOPS_REPO }}
      APP_NAME: ${{ vars.APP_NAME }}
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Delete GitOps PR environment
        run: |
          PR_DIR="gitops/environments/dev/pr-${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            rm -rf "$PR_DIR"
          fi
          git -C gitops status --short

      - name: Commit and push GitOps PR cleanup
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A "environments/dev/pr-${{ github.event.pull_request.number }}"

          if git diff --cached --quiet; then
            echo "No PR environment changes to commit."
            exit 0
          fi

          git commit -m "chore: remove ${APP_NAME} PR-${{ github.event.pull_request.number }} environment"
          git push

  helm-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check chart changes
        id: chart_changes
        run: |
          if git diff --name-only HEAD~1 | grep -q "^chart/"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Helm
        if: steps.chart_changes.outputs.changed == 'true'
        uses: azure/setup-helm@v4

      - name: Log in to GHCR for Helm
        if: steps.chart_changes.outputs.changed == 'true'
        run: |
          helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push Helm chart
        if: steps.chart_changes.outputs.changed == 'true'
        run: |
          helm package chart --destination .
          CHART_TGZ="$(ls -1 *.tgz | head -1)"
          helm push "$CHART_TGZ" oci://ghcr.io/${{ github.repository }}
